name: "Exportovat do APK (Godot 4.3)"
on: push

# TENTO ŘÁDEK POVOLÍ ZÁPIS SOUBORŮ
permissions: write-all

jobs:
  export_android:
    runs-on: ubuntu-latest
    name: Export do Androidu
    steps:
      - name: Stáhnout kód
        uses: actions/checkout@v4

      - name: Godot Android Export
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          export_template_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true
